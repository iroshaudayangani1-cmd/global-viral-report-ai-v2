name: Python Test

on:
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y google-generativeai || true
          pip install --no-cache-dir -r requirements.txt

      - name: Check Secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "SECRET NOT FOUND"
            exit 1
          else
            echo "SECRET FOUND"
          fi

      - name: Collect News
        run: python scripts/news_collector.py

      - name: Rank News
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/news_ranker.py

      - name: Upload Collected News
        uses: actions/upload-artifact@v4
        with:
          name: collected-news
          path: output/news/news.json

      - name: Upload Ranked Story
        uses: actions/upload-artifact@v4
        with:
          name: ranked-story
          path: output/ranked/best_story.json
