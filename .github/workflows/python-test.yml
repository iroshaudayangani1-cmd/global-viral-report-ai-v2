name: Python Test

on:
  workflow_dispatch:

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y google-generativeai || true
          pip install --no-cache-dir -r requirements.txt

      - name: Check GEMINI_API_KEY
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "❌ GEMINI_API_KEY secret NOT FOUND"
            exit 1
          else
            echo "✅ GEMINI_API_KEY secret FOUND"
          fi

      - name: Show Repository Structure
        run: |
          echo "===== ROOT ====="
          ls -la
          echo ""
          echo "===== SCRIPTS ====="
          ls -la scripts
          echo ""
          echo "===== OUTPUT ====="
          mkdir -p output/news
          mkdir -p output/generated
          ls -la output
          ls -la output/news
          ls -la output/generated

      - name: Run News Collector
        run: |
          python scripts/news_collector.py

      - name: Verify News Output
        run: |
          echo "===== NEWS OUTPUT ====="
          ls -la output/news

      - name: Upload News Files
        uses: actions/upload-artifact@v4
        with:
          name: collected-news
          path: output/news/

